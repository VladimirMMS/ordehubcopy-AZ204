name: Build and deploy Node.js app to Azure Web App - app-orderhubapi-vladimircopy-staging

on:
  push:
    branches:
      - uat
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: src/api
        run: npm install

      - name: Build NestJS app
        working-directory: src/api
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: src/api

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7FA550ABF0A048E1A03FDC539791F3F2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_93A7C77B279245308E63673C3AAD81BE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1D3619E55424B04B4FD1093A008C940 }}

      - name: Deploy to Azure UAT
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-orderhubapi-vladimircopy'
          slot-name: 'uat'
          package: .