name: Build and deploy Node.js app to Azure Web App - app-orderhubapi-vladimircopy-staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: src/api
        run: npm install

      - name: Build NestJS app
        working-directory: src/api
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: src/api

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_C520FEC5AB22448F927F2342FC6354DC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_49A7DE609DC14481B41E669B84F0D114 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B288D9EA6634E4CB152C06EC62EEF7A }}

      - name: Deploy to Azure Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-orderhubapi-vladimircopy'
          slot-name: 'staging'
          package: .