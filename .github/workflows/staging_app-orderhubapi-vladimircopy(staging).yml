name: Build and deploy Node.js app to Azure Web App - app-orderhubapi-vladimircopy-staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: src/api
        run: npm install

      - name: Build NestJS app
        working-directory: src/api
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: src/api

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CE2DBFE0280743E2B77C68158FDF288C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E5743E008BEE4A009154321C62E6F12C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E4F61F8AD19A4624A86D1D982CE495B8 }}

      - name: Deploy to Azure Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-orderhubapi-vladimircopy'
          slot-name: 'staging'
          package: .